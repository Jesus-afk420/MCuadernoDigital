name: cuaderno_digital_app
description: "Ecosistema Móvil para Mi Cuaderno Digital con Sincronización Firebase."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Iconos
  cupertino_icons: ^1.0.8
  
  # Firebase (versiones actualizadas para Flutter 3.44.1)
  firebase_core: ^3.12.0
  cloud_firestore: ^5.6.0
  firebase_auth: ^5.5.0
  
  # Peticiones HTTP
  http: ^1.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true